<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="tri" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="33%" stop-color="#1e3a8a"/>
      <stop offset="33%" stop-color="#f8fafc"/>
      <stop offset="66%" stop-color="#f8fafc"/>
      <stop offset="66%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect y="0" width="1200" height="4" fill="url(#tri)"/>
  <circle cx="1050" cy="120" r="200" fill="#2563eb" opacity="0.12"/>
  <circle cx="150" cy="520" r="180" fill="#dc2626" opacity="0.08"/>
  <!-- Logo -->
  <rect x="80" y="80" width="64" height="64" rx="16" fill="url(#btn)"/>
  <text x="112" y="124" font-family="system-ui,sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle">Qa</text>
  <text x="160" y="120" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="white">QCM Assimilation</text>
  <!-- Title -->
  <text x="80" y="260" font-family="system-ui,sans-serif" font-size="52" font-weight="800" fill="white">Examen civique, naturalisation</text>
  <text x="80" y="325" font-family="system-ui,sans-serif" font-size="52" font-weight="800" fill="white">ou curiosité pour la France</text>
  <!-- Subtitle -->
  <text x="80" y="400" font-family="system-ui,sans-serif" font-size="24" fill="#94a3b8">Préparez-vous avec les bonnes questions.</text>
  <text x="80" y="436" font-family="system-ui,sans-serif" font-size="24" fill="#94a3b8">500+ questions corrigées · Mis à jour 2026</text>
  <!-- Badge -->
  <rect x="80" y="490" width="260" height="44" rx="22" fill="#2563eb" opacity="0.2" stroke="#60a5fa" stroke-opacity="0.3" stroke-width="1"/>
  <text x="210" y="518" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#93c5fd" text-anchor="middle">qcm-assimilation.fr</text>
  <!-- Domain -->
  <text x="80" y="590" font-family="system-ui,sans-serif" font-size="18" fill="#475569">cap-citoyen.fr · Quiz · Audio · Mode scroll</text>
